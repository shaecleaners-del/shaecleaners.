<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profil Saya | Shae Cleaners</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="profile.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="profile-header">

<a href="akun.html" class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
</a>

<h2>Profil Saya</h2>

</header>

<!-- FOTO PROFIL -->

<section class="profile-top">

<div class="photo-box">

<img src="assets/profile.png"
id="previewPhoto"
alt="Profile">

<label for="photoInput" class="camera">

<i class="fa-solid fa-camera"></i>

</label>

<input
type="file"
id="photoInput"
accept="image/*"
hidden>

</div>

<h2 id="displayName">

Pelanggan

</h2>

<p id="displayEmail">

email@gmail.com

</p>

</section>

<!-- FORM -->

<section class="profile-form">

<div class="form-group">

<label>Nama Lengkap</label>

<input
type="text"
id="nama">

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email"
readonly>

</div>

<div class="form-group">

<label>Nomor WhatsApp</label>

<input
type="tel"
id="phone"
placeholder="08xxxxxxxxxx">

</div>

<div class="form-group">

<label>Alamat</label>

<textarea
id="alamat"
rows="4"></textarea>

</div>

<div class="form-group">

<label>Kota</label>

<input
type="text"
id="kota">

</div>

<div class="form-group">

<label>Kode Pos</label>

<input
type="number"
id="kodepos">

</div>

<button
id="saveProfile"
class="save-btn">

<i class="fa-solid fa-floppy-disk"></i>

Simpan Perubahan

</button>

</section>
<!-- ================= KEAMANAN ================= -->

<section class="profile-form">

<h3>Keamanan Akun</h3>

<div class="form-group">

<label>Password Baru</label>

<input
type="password"
id="newPassword"
placeholder="Masukkan password baru">

</div>

<div class="form-group">

<label>Konfirmasi Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Ulangi password baru">

</div>

<button
id="changePassword"
class="save-btn">

<i class="fa-solid fa-lock"></i>

Ubah Password

</button>

</section>

<!-- ================= INFORMASI AKUN ================= -->

<section class="profile-form">

<h3>Informasi Akun</h3>

<div class="info-item">

<span>Status Akun</span>

<strong id="accountStatus">

Aktif

</strong>

</div>

<div class="info-item">

<span>Member Sejak</span>

<strong id="memberSince">

-

</strong>

</div>

<div class="info-item">

<span>Total Order</span>

<strong id="profileOrder">

0

</strong>

</div>

</section>

<!-- ================= CUSTOMER SERVICE ================= -->

<section class="profile-form">

<h3>Bantuan</h3>

<a href="https://wa.me/6281234567890"

class="save-btn"

style="text-decoration:none;display:block;text-align:center;background:#25D366;">

<i class="fa-brands fa-whatsapp"></i>

Hubungi Customer Service

</a>

</section>

<!-- ================= HAPUS AKUN ================= -->

<section class="profile-form">

<button

id="deleteAccount"

class="save-btn"

style="background:#dc2626;">

<i class="fa-solid fa-trash"></i>

Hapus Akun

</button>

</section>

<!-- ================= BOTTOM NAVIGATION ================= -->

<nav class="bottom-nav">

<a href="index.html">

<i class="fa-solid fa-house"></i>

<span>Beranda</span>

</a>

<a href="promo.html">

<i class="fa-solid fa-tags"></i>

<span>Promo</span>

</a>

<a href="order.html">

<i class="fa-solid fa-cart-shopping"></i>

<span>Order</span>

</a>

<a href="tracking.html">

<i class="fa-solid fa-truck-fast"></i>

<span>Tracking</span>

</a>

<a href="akun.html" class="active">

<i class="fa-solid fa-user"></i>

<span>Akun</span>

</a>

</nav>

<script type="module" src="firebase.js"></script>
<script src="profile.js"></script>

</body>
</html>
